    {q:"(Ch.2–3) Adam: written test $p=0.4$, road test $p=0.7$, independently. Expected total tests for license?",
     ans:"Written: $\\text{Geom}(0.4)$, $E[\\text{written}]=1/0.4=2.5$. Road: $\\text{Geom}(0.7)$, $E[\\text{road}]=1/0.7\\approx 1.43$. Total $E\\approx 3.93$."},
    {q:"(Ch.3 Normal) Male heights $N(70,9)$. (a) $P(\\text{taller than 76 in})$? (b) 90th percentile?",
     ans:"(a) $z=(76-70)/3=2$. $P(Z>2)=1-\\Phi(2)\\approx 0.0228$. (b) $z_{0.90}\\approx 1.282$. Height $=70+3(1.282)\\approx 73.85$ in."},
    {q:"(Ch.5 Transform) $X\\sim\\text{Uniform}(0,1)$. Find the pdf of $Y=-\\ln(X)$. What distribution?",
     ans:"$F_Y(y)=P(-\\ln X\\leq y)=P(X\\geq e^{-y})=1-e^{-y}$ for $y>0$. $f_Y(y)=e^{-y}$. This is $\\text{Exp}(1)$."},
    {q:"(Ch.6) $(X,Y)$ uniform on $D=[0,1]\\times[0,2]$. (a) Joint density. (b) Independent? (c) $P(X+Y\\leq 1.5)$.",
     ans:"(a) $f(x,y)=1/2$ on $D$. (b) Yes: rectangular support and $f=f_X\\cdot f_Y$. (c) $\\int_0^1(1.5-x)\\cdot(1/2)\\,dx=(1/2)[1.5x-x^2/2]_0^1=0.5$."},
    {q:"(Ch.8 Indicators) 100 guests, any two know each other with prob $1/2$. Expected number of groups of 4 mutual acquaintances?",
     ans:"Let $I_S=1$ if all 4 in group $S$ know each other. $P(I_S=1)=(1/2)^{\\binom{4}{2}}=1/64$. $\\binom{100}{4}=3{,}921{,}225$. $E[X]=3{,}921{,}225/64\\approx 61{,}269$."},
    {q:"(Ch.8 Cov) $\\text{Var}(X_1)=1$, $\\text{Var}(X_2)=4$, $\\text{Cov}(X_1,X_2)=2$. $Y=X_1+X_2$. Compute $\\text{Cov}(X_1,Y)$.",
     ans:"$\\text{Cov}(X_1,Y)=\\text{Cov}(X_1,X_1+X_2)=\\text{Var}(X_1)+\\text{Cov}(X_1,X_2)=1+2=3$."},
    {q:"(Ch.9) Player plays 1000 games: wins &#36;2 ($p=0.48$), loses &#36;1 ($p=0.52$). Use CLT to approximate $P(\\text{net gain}>0)$.",
     ans:"$E[X_i]=2(0.48)+(-1)(0.52)=0.44$. $\\text{Var}(X_i)=2.44-0.44^2\\approx 2.246$. $S_{1000}$: $E=440$, $SD\\approx 47.4$. $P(S>0)=P(Z>-9.28)\\approx 1$."},
    {q:"(Ch.7) $X,Y$ independent $\\text{Geom}(p)$. Show $P(X+Y=n)=(n-1)p^2(1-p)^{n-2}$. What distribution?",
     ans:"$P(X+Y=n)=\\sum_{k=1}^{n-1}p(1-p)^{k-1}\\cdot p(1-p)^{n-k-1}=p^2(1-p)^{n-2}(n-1)$. This is $\\text{NegBin}(2,p)$."},
    {q:"(Ch.9) $X\\geq 0$, $E[X]=5$, $\\text{Var}(X)=4$. (a) Markov bound for $P(X\\geq 10)$. (b) Chebyshev bound. (c) Which is sharper?",
     ans:"(a) Markov: $P(X\\geq 10)\\leq 5/10=1/2$. (b) Chebyshev: $P(|X-5|\\geq 5)\\leq 4/25=0.16$. (c) Chebyshev (0.16 < 0.5) because it uses variance."},

    {q:"(Ch.1) $n$ people randomly pick hats. (a) $P(\\text{person 1 gets own hat})$? (b) $P(\\text{no one gets own hat})$ for $n=4$?",

    {q:"(Ch.2) Urn A: 2R, 3B; Urn B: 4R, 1B. Flip coin — heads draw from A, tails from B. (a) $P(\\text{red})$? (b) Given red, $P(\\text{from Urn A})$?",

    {q:"(Ch.3 Variance) $X\\sim\\text{Bin}(n,p)$. (a) Show $E[X]=np$ using indicators. (b) Compute $\\text{Var}(X)$ same way.",

    {q:"(Ch.5 MGF) $X_1,X_2$ independent $\\text{Exp}(1)$. Use MGFs to show $X_1+X_2\\sim\\text{Gamma}(2,1)$.",

    {q:"(Ch.8 Cov) $E[X]=1$, $E[Y]=2$, $\\text{Var}(X)=2$, $\\text{Var}(Y)=3$, $\\text{Cov}(X,Y)=1$. Compute $\\text{Cov}(2X+1,Y-3)$.",

    {q:"(Ch.6 Marginals) $f(x,y)=3x$ for $0\\leq y\\leq x\\leq 1$. (a) Marginals $f_X$ and $f_Y$. (b) Independent?",

    {q:"(Ch.7 Exchangeability) Show $X_1,X_2,X_3$ iid discrete are exchangeable.",

    {q:"(Ch.9 Markov) Online retailer: $X\\geq 0$, $E[X]=20$. (a) Bound $P(X\\geq 100)$. (b) If $\\text{Var}(X)=50$, improve with Chebyshev.",

    {q:"(Ch.9 CLT) Machine bolts: iid mean 50mm, variance 0.09. Sample of 100. $P(49.97<\\bar{X}<50.03)$?",

    {q:"(Ch.9 WLLN Proof) Prove WLLN: $X_i$ iid, $E=\\mu$, $\\text{Var}=\\sigma^2<\\infty$. For any $\\varepsilon>0$, $P(|\\bar{X}_n-\\mu|\\geq\\varepsilon)\\to 0$.",

let state = {};
EXAMS.forEach(e=>{state[e.id]={answered:{},frShown:{},frGrades:{},graded:false,score:0,frScore:0}});

function buildExams(){
  const container=document.getElementById('exams-container');
  const tabBar=document.getElementById('tab-bar');
  EXAMS.forEach((exam,idx)=>{
    const tab=document.createElement('button');
    tab.className='tab'+(idx===0?' active':'');
    tab.textContent=exam.title;
    tab.onclick=()=>switchExam(exam.id);
    tab.id=`tab-${exam.id}`;
    tabBar.appendChild(tab);

    const div=document.createElement('div');
    div.className='exam'+(idx===0?' active':'');
    div.id=`exam-${exam.id}`;
    div.innerHTML=buildExamHTML(exam);
    container.appendChild(div);
  });
}

function buildExamHTML(exam){
  let h=`<h2 class="sr-only">Practice Exam ${exam.id}</h2>`;
  h+=`<div class="section-label">Part I — Multiple Choice (1 pt each)</div>`;
  exam.mc.forEach((q,i)=>{
    const n=i+1;
    h+=`<div class="q" id="q-${exam.id}-${n}">`;
    h+=`<div class="q-num">Question ${n}</div>`;
    h+=`<div class="q-text">${q.q}</div>`;
    h+=`<div class="choices">`;
    q.choices.forEach((c,ci)=>{
      const letters=['A','B','C','D'];
      h+=`<label class="choice" id="c-${exam.id}-${n}-${ci}">
        <input type="radio" name="q-${exam.id}-${n}" value="${ci}" onchange="selectAnswer(${exam.id},${n},${ci})">
        <span>${letters[ci]}.&nbsp;${c}</span>
      </label>`;
    });
    h+=`</div>`;
    h+=`<div class="feedback" id="fb-${exam.id}-${n}"></div>`;
    h+=`</div>`;
  });

  h+=`<div class="section-label">Part II — Free Response (2 pts each)</div>`;
  exam.fr.forEach((q,i)=>{
    const n=i+1;
    h+=`<div class="fr-q" id="fr-${exam.id}-${n}">`;
    h+=`<div class="q-num">Free Response ${n}</div>`;
    h+=`<div class="fr-text">${q.q}</div>`;
    h+=`<textarea class="answer-area" placeholder="Work out your answer here…" rows="5"></textarea>`;
    h+=`<div class="fr-actions">`;
    h+=`<button class="submit-fr-btn" onclick="submitFR(${exam.id},${n})">Check Answer</button>`;
    h+=`<button class="show-answer-btn" onclick="toggleAns(${exam.id},${n},this)">Show answer key</button>`;
    h+=`</div>`;
    h+=`<div class="answer-reveal" id="ans-${exam.id}-${n}"><strong>Answer Key:</strong><br>${q.ans}</div>`;
    h+=`<div class="fr-grade-btns" id="fr-grade-${exam.id}-${n}">`;
    h+=`<span style="font-size:12.5px;color:#555">Self-grade:</span>`;
    h+=`<button class="fr-grade-btn ok" onclick="markFR(${exam.id},${n},'ok')">&#10003; Full (2 pts)</button>`;
    h+=`<button class="fr-grade-btn half" onclick="markFR(${exam.id},${n},'half')">~ Partial (1 pt)</button>`;
    h+=`<button class="fr-grade-btn no" onclick="markFR(${exam.id},${n},'no')">&#10007; Wrong (0 pts)</button>`;
    h+=`</div>`;
    h+=`<span class="fr-scored" id="fr-scored-${exam.id}-${n}"></span>`;
    h+=`</div>`;
  });

  h+=`<div class="exam-footer">`;
  h+=`<button class="grade-btn" onclick="gradeExam(${exam.id})">Show Final Score</button>`;
  h+=`<button class="reset-btn" onclick="resetExam(${exam.id})">Reset</button>`;
  h+=`<span class="progress" id="prog-${exam.id}">0/${exam.mc.length} answered</span>`;
  h+=`</div>`;
  h+=`<div class="result-bar"><div class="result-fill" id="bar-${exam.id}" style="width:0%"></div></div>`;
  h+=`<div class="result-summary" id="summary-${exam.id}"></div>`;
  return h;
}

function switchExam(id){
  document.querySelectorAll('.exam').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`exam-${id}`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');
  updateGlobalScore(id);
}

function selectAnswer(examId,qn,ci){
  const s=state[examId];
  if(s.answered[qn]!==undefined) return;
  s.answered[qn]=ci;
  const exam=EXAMS.find(e=>e.id===examId);
  const prog=Object.keys(s.answered).length;
  document.getElementById(`prog-${examId}`).textContent=`${prog}/${exam.mc.length} answered`;
  showFeedback(examId,qn,ci);
  s.score=exam.mc.filter((q,i)=>s.answered[i+1]===q.ans).length;
  updateGlobalScore(examId);
}

function gradeExam(id){
  const exam=EXAMS.find(e=>e.id===id);
  const s=state[id];
  s.graded=true;
  const letters=['A','B','C','D'];
  exam.mc.forEach((q,i)=>{
    const n=i+1;
    const chosen=s.answered[n];
    if(chosen===undefined){
      const qEl=document.getElementById(`q-${id}-${n}`);
      qEl.classList.add('wrong');
      document.getElementById(`c-${id}-${n}-${q.ans}`).classList.add('show-correct');
      document.querySelectorAll(`input[name="q-${id}-${n}"]`).forEach(inp=>inp.disabled=true);
      document.querySelectorAll(`[id^="c-${id}-${n}-"]`).forEach(el=>el.classList.add('disabled'));
      const fb=document.getElementById(`fb-${id}-${n}`);
      fb.className='feedback show wrong-fb';
      fb.innerHTML=`Not answered. Correct answer: <strong>${letters[q.ans]}</strong>. ${q.exp}`;
      if(window.MathJax) MathJax.typesetPromise([fb]);
    }
  });
  const correct=exam.mc.filter((q,i)=>s.answered[i+1]===q.ans).length;
  s.score=correct;
  const pct=Math.round(correct/exam.mc.length*100);
  const bar=document.getElementById(`bar-${id}`);
  bar.style.width=pct+'%';
  bar.className='result-fill'+(pct>=70?'':pct>=50?' mid':' low');
  const frGraded=Object.keys(s.frGrades).length;
  const sum=document.getElementById(`summary-${id}`);
  sum.className='result-summary show';
  sum.innerHTML=`<strong>MC: ${correct}/${exam.mc.length} (${pct}%)</strong>${frGraded>0?` &nbsp;|&nbsp; <strong>FR: ${s.frScore}/${exam.fr.length*2}</strong>`:' &nbsp;|&nbsp; Submit free-response answers to track FR score.'}<br>Full exam total = ${exam.mc.length+exam.fr.length*2} pts.`;
  updateGlobalScore(id);
}

function showFeedback(examId,qn,chosen){
  const exam=EXAMS.find(e=>e.id===examId);
  const q=exam.mc[qn-1];
  const letters=['A','B','C','D'];
  const qEl=document.getElementById(`q-${examId}-${qn}`);
  const fb=document.getElementById(`fb-${examId}-${qn}`);
  qEl.classList.remove('correct','wrong');
  document.querySelectorAll(`[id^="c-${examId}-${qn}-"]`).forEach(el=>{
    el.classList.remove('selected-correct','selected-wrong','show-correct','disabled');
  });
  document.querySelectorAll(`input[name="q-${examId}-${qn}"]`).forEach(inp=>inp.disabled=true);
  document.querySelectorAll(`[id^="c-${examId}-${qn}-"]`).forEach(el=>el.classList.add('disabled'));
  if(chosen===q.ans){
    qEl.classList.add('correct');
    document.getElementById(`c-${examId}-${qn}-${chosen}`).classList.add('selected-correct');
    fb.className='feedback show correct-fb';
    fb.innerHTML=`Correct! ${q.exp}`;
  } else {
    qEl.classList.add('wrong');
    document.getElementById(`c-${examId}-${qn}-${chosen}`).classList.add('selected-wrong');
    document.getElementById(`c-${examId}-${qn}-${q.ans}`).classList.add('show-correct');
    fb.className='feedback show wrong-fb';
    fb.innerHTML=`Incorrect. Correct answer: <strong>${letters[q.ans]}</strong>. ${q.exp}`;
  }
  if(window.MathJax) MathJax.typesetPromise([fb]);
}

function toggleAns(examId,n,btn){
  const el=document.getElementById(`ans-${examId}-${n}`);
  const showing=el.classList.contains('show');
  el.classList.toggle('show',!showing);
  btn.textContent=showing?'Show answer key':'Hide answer key';
}

function resetExam(id){
  state[id]={answered:{},frShown:{},frGrades:{},graded:false,score:0,frScore:0};
  const exam=EXAMS.find(e=>e.id===id);
  exam.mc.forEach((q,i)=>{
    const n=i+1;
    document.getElementById(`q-${id}-${n}`).classList.remove('correct','wrong');
    document.querySelectorAll(`input[name="q-${id}-${n}"]`).forEach(inp=>{inp.disabled=false;inp.checked=false;});
    document.querySelectorAll(`[id^="c-${id}-${n}-"]`).forEach(el=>el.classList.remove('selected-correct','selected-wrong','show-correct','disabled'));
    const fb=document.getElementById(`fb-${id}-${n}`);
    fb.className='feedback';
    fb.innerHTML='';
  });
  exam.fr.forEach((q,i)=>{
    const n=i+1;
    const frEl=document.getElementById(`fr-${id}-${n}`);
    const ta=frEl.querySelector('textarea');
    if(ta){ta.value='';ta.disabled=false;}
    const submitBtn=frEl.querySelector('.submit-fr-btn');
    if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='Check Answer';}
    const showBtn=frEl.querySelector('.show-answer-btn');
    if(showBtn) showBtn.textContent='Show answer key';
    document.getElementById(`ans-${id}-${n}`).classList.remove('show');
    const gradeEl=document.getElementById(`fr-grade-${id}-${n}`);
    if(gradeEl) gradeEl.classList.remove('show');
    const scored=document.getElementById(`fr-scored-${id}-${n}`);
    if(scored){scored.className='fr-scored';scored.textContent='';}
  });
  document.getElementById(`prog-${id}`).textContent=`0/${exam.mc.length} answered`;
  document.getElementById(`bar-${id}`).style.width='0%';
  document.getElementById(`bar-${id}`).className='result-fill';
  document.getElementById(`summary-${id}`).className='result-summary';
  updateGlobalScore(id);
}

function updateGlobalScore(id){
  const s=state[id];
  const exam=EXAMS.find(e=>e.id===id);
  const answered=Object.keys(s.answered).length;
  const frGraded=Object.keys(s.frGrades).length;
  if(answered===0&&frGraded===0){
    document.getElementById('global-score').textContent=`Exam ${id}: 0/${exam.mc.length} answered`;
  } else {
    const frPart=frGraded>0?` | FR ${s.frScore}/${exam.fr.length*2}`:'';
    document.getElementById('global-score').textContent=`Exam ${id}: MC ${s.score}/${exam.mc.length}${frPart}`;
  }
}

function submitFR(examId,n){
  const frEl=document.getElementById(`fr-${examId}-${n}`);
  const ta=frEl.querySelector('textarea');
  ta.disabled=true;
  const btn=frEl.querySelector('.submit-fr-btn');
  btn.disabled=true;
  btn.textContent='Submitted';
  const ansEl=document.getElementById(`ans-${examId}-${n}`);
  ansEl.classList.add('show');
  const gradeEl=document.getElementById(`fr-grade-${examId}-${n}`);
  gradeEl.classList.add('show');
  if(window.MathJax) MathJax.typesetPromise([ansEl,gradeEl]);
}

function markFR(examId,n,grade){
  const pts={ok:2,half:1,no:0};
  const labels={ok:'Full credit (2 pts)',half:'Partial credit (1 pt)',no:'No credit (0 pts)'};
  state[examId].frGrades[n]=grade;
  document.getElementById(`fr-grade-${examId}-${n}`).classList.remove('show');
  const scored=document.getElementById(`fr-scored-${examId}-${n}`);
  scored.textContent=labels[grade];
  scored.className=`fr-scored show ${grade}`;
  let frScore=0;
  Object.values(state[examId].frGrades).forEach(g=>frScore+=pts[g]||0);
  state[examId].frScore=frScore;
  updateGlobalScore(examId);
}

buildExams();
</script>
